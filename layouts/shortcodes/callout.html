{{ $type := .Get "type" | default "note" }}
{{ $title := .Get "title" }}
{{ $icon := dict "note" "info-circle" "tip" "check-circle" "warning" "exclamation-triangle" "danger" "ban" }}
<div class="callout callout-{{ $type }}">
  {{ with $title }}<div class="callout-title"><i class="fas fa-{{ index $.Params "icon" | default (index $icon $type) }}"></i> {{ . }}</div>{{ end }}
  <div class="callout-body">
  {{ .Inner | markdownify }}
  </div>
</div>
