<input type="radio" name="auth-global" id="auth-global-oauth" class="auth-global-radio" checked>
<input type="radio" name="auth-global" id="auth-global-cert" class="auth-global-radio">
<input type="radio" name="auth-global" id="auth-global-basic" class="auth-global-radio">
<div class="auth-selector">
  <div class="auth-selector-label">Pick your auth method:</div>
  <div class="auth-selector-choices">
    <label for="auth-global-oauth"><i class="fas fa-key"></i> OAuth2 <span class="auth-rec">Recommended</span></label>
    <label for="auth-global-cert"><i class="fas fa-certificate"></i> Certificate</label>
    <label for="auth-global-basic"><i class="fas fa-user-lock"></i> Basic Auth</label>
  </div>
</div>
